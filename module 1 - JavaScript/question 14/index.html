<!DOCTYPE html>
<html>
<head>

    <title>jQuery Example</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        #eventCard {
            width: 250px;
            padding: 20px;
            background-color: lightblue;
            margin-top: 20px;
            border-radius: 10px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

    </style>

</head>

<body>

    <h2>Event Registration</h2>

    <button id="registerBtn">
        Register
    </button>

    <div id="eventCard">
        Welcome to Tech Conference
    </div>

    <p id="frameworkBenefit"></p>

    <script src="script.js"></script>

</body>
</html>
